name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "trilha-inteligencia-emocional.md"
      - "assets/style.css"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build static site
        run: |
          mkdir -p public
          cp assets/style.css public/style.css
          pandoc trilha-inteligencia-emocional.md \
            --standalone \
            --metadata title="Trilha de Inteligência Emocional" \
            --css=style.css \
            -o public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
